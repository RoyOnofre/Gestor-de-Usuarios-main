<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container py-5 animate-fade">
        <div class="d-flex justify-content-between align-items-end mb-5">
            <div>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-2">
                        <li class="breadcrumb-item"><a href="/" class="text-decoration-none text-muted">Dashboard</a></li>
                        <li class="breadcrumb-item active">Productos</li>
                    </ol>
                </nav>
                <h2 class="display-5 fw-bold mb-0">Gestión de <span class="text-primary">Productos</span></h2>
            </div>
            <a th:href="@{/products/new}" class="btn btn-primary d-flex align-items-center mb-1">
                <i class="bi bi-box-seam me-2"></i> Registrar Producto
            </a>
        </div>

        <div class="card border-0 shadow-sm overflow-hidden rounded-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-dark text-white">
                        <tr style="background: var(--dark-deep) !important;">
                            <th class="ps-4 py-3">Referencia</th>
                            <th class="py-3">Detalles del Producto</th>
                            <th class="py-3">Categoría</th>
                            <th class="py-3">Precio</th>
                            <th class="py-3">Stock</th>
                            <th class="py-3 text-end pe-4">Acciones</th>
                        </tr>
                    </thead>
                    <tbody style="border-top: none;">
                        <tr th:each="prod : ${products}" class="border-bottom">
                            <td class="ps-4">
                                <img th:if="${prod.image != null}" th:src="${prod.image}" class="rounded-3 shadow-sm" style="width: 60px; height: 60px; object-fit: cover; border: 2px solid #eee;">
                                <div th:unless="${prod.image != null}" class="bg-light rounded-3 d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
                                    <i class="bi bi-cpu text-muted fs-3"></i>
                                </div>
                            </td>
                            <td>
                                <div class="fw-bold fs-5 text-dark" th:text="${prod.name}">Product Name</div>
                                <div class="text-muted small">ID Sistema: #PRD-<span th:text="${prod.id}"></span></div>
                            </td>
                            <td>
                                <span class="badge bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25" th:text="${prod.category.name}">Category</span>
                            </td>
                            <td class="fw-800 text-dark">
                                <span class="text-secondary opacity-50 small pe-1">$</span><span th:text="${prod.price}">0.00</span>
                            </td>
                            <td>
                                <div class="d-flex align-items-center">
                                    <span th:class="${prod.cantid < 10 ? 'text-danger fw-bold' : 'text-dark fw-500'}" th:text="${prod.cantid}">0</span>
                                    <span class="ms-1 text-muted x-small">unds</span>
                                </div>
                            </td>
                            <td class="text-end pe-4">
                                <div class="btn-group">
                                    <a th:href="@{/products/edit/{id}(id=${prod.id})}" class="btn btn-sm btn-outline-primary rounded-circle me-1" title="Editar">
                                        <i class="bi bi-pencil-fill"></i>
                                    </a>
                                    <a th:href="@{/products/delete/{id}(id=${prod.id})}" class="btn btn-sm btn-outline-danger rounded-circle" 
                                       onclick="return confirm('¿Eliminar producto del inventario?')" title="Eliminar">
                                        <i class="bi bi-trash-fill"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div th:if="${#lists.isEmpty(products)}" class="text-center py-5">
                <div class="py-5">
                    <i class="bi bi-search display-1 text-muted opacity-25 mb-4 d-block"></i>
                    <h3 class="fw-bold text-muted">Inventario Vacío</h3>
                    <p class="text-muted">No se encontraron productos registrados en este momento.</p>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
