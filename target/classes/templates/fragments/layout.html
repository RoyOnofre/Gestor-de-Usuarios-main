<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore | Professional Inventory</title>
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --primary: #6366f1; /* Indigo 500 */
            --primary-dark: #4f46e5;
            --secondary: #06b6d4; /* Cyan 500 */
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --dark-deep: #0f172a;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --glass: rgba(255, 255, 255, 0.8);
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, .navbar-brand {
            font-family: 'Outfit', sans-serif;
        }

        /* Premium Navbar */
        .navbar {
            background: var(--dark-deep);
            padding: 1rem 0;
            border-bottom: 2px solid var(--primary);
        }
        .navbar-brand {
            font-size: 1.5rem;
            letter-spacing: -1px;
        }
        .nav-link {
            font-weight: 500;
            color: rgba(255,255,255,0.7) !important;
            transition: all 0.3s ease;
            position: relative;
        }
        .nav-link:hover {
            color: var(--secondary) !important;
        }
        .nav-link.active {
            color: white !important;
        }

        /* Action Cards */
        .card {
            background: var(--bg-card);
            border: none;
            border-radius: 20px;
            box-shadow: var(--shadow-md);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }

        /* Buttons Premium */
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 12px;
            padding: 0.8rem 1.5rem;
            font-weight: 600;
            box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.39);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px 0 rgba(79, 70, 229, 0.45);
        }

        /* Tables Modernized */
        .table {
            border-collapse: separate;
            border-spacing: 0 10px;
        }
        .table thead th {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }
        .table tbody tr {
            background: white;
            box-shadow: var(--shadow-sm);
            border-radius: 12px;
            transition: all 0.2s ease;
        }
        .table tbody tr:hover {
            transform: scale(1.01);
            background: #fafafa;
        }
        .table td {
            padding: 1.2rem 1rem;
            border: none;
        }
        .table td:first-child { border-radius: 12px 0 0 12px; }
        .table td:last-child { border-radius: 0 12px 12px 0; }

        /* Badge Styles */
        .badge {
            padding: 0.5em 1em;
            font-weight: 600;
            border-radius: 8px;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade {
            animation: fadeIn 0.5s ease forwards;
        }
    </style>
</head>
<body>
    <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <div class="bg-primary p-2 rounded-3 me-2" style="background: linear-gradient(135deg, var(--secondary), var(--primary)) !important;">
                    <i class="bi bi-cpu-fill text-white fs-4"></i>
                </div>
                TECH<span class="text-secondary">STORE</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2">
                    <li class="nav-item">
                        <a class="nav-link px-3" th:href="@{/categories}">Categorías</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" th:href="@{/products}">Productos</a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a th:href="@{/products/new}" class="btn btn-primary d-flex align-items-center">
                            <i class="bi bi-plus-circle me-2"></i> Nuevo
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div th:fragment="scripts">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </div>
</body>
</html>
