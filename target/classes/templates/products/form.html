<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container py-5 animate-fade">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card p-0 border-0 shadow-lg position-relative overflow-hidden">
                    <div class="bg-primary p-4 text-white d-flex align-items-center justify-content-between">
                        <div>
                            <h3 class="fw-bold mb-0" th:text="${product.id == null ? 'Registro de Producto' : 'Actualización Pro'}">Header</h3>
                            <p class="mb-0 opacity-75 small text-uppercase fw-600">Inventory Management System</p>
                        </div>
                        <i class="bi bi-box-seam display-5 opacity-50"></i>
                    </div>
                    
                    <div class="card-body p-5">
                        <form th:action="@{/products/save}" th:object="${product}" method="post">
                            <input type="hidden" th:field="*{id}">
                            
                            <div class="row g-4">
                                <div class="col-md-7">
                                    <label for="name" class="form-label fw-bold small text-muted">NOMBRE DEL PRODUCTO</label>
                                    <input type="text" th:field="*{name}" class="form-control form-control-lg bg-light border-0" id="name" placeholder="Ej. RTX 4080 Super" required>
                                </div>
                                <div class="col-md-5">
                                    <label for="category" class="form-label fw-bold small text-muted">CATEGORÍA ASIGNADA</label>
                                    <select th:field="*{category}" class="form-select form-select-lg bg-light border-0" id="category" required>
                                        <option value="" disabled selected>Seleccionar...</option>
                                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                                    </select>
                                </div>

                                <div class="col-md-6 mt-4">
                                    <label for="price" class="form-label fw-bold small text-muted">PRECIO VENTA ($)</label>
                                    <div class="input-group input-group-lg">
                                        <span class="input-group-text bg-light border-0 text-primary">$</span>
                                        <input type="number" step="0.01" th:field="*{price}" class="form-control bg-light border-0" id="price" placeholder="0.00" required>
                                    </div>
                                </div>
                                <div class="col-md-6 mt-4">
                                    <label for="cantid" class="form-label fw-bold small text-muted">CANTIDAD EN ALMACÉN</label>
                                    <input type="number" th:field="*{cantid}" class="form-control form-control-lg bg-light border-0" id="cantid" placeholder="0" required>
                                </div>

                                <div class="col-12 mt-4">
                                    <label for="image" class="form-label fw-bold small text-muted">RECURSO VISUAL (URL)</label>
                                    <div class="input-group input-group-lg">
                                        <span class="input-group-text bg-light border-0"><i class="bi bi-link-45deg"></i></span>
                                        <input type="url" th:field="*{image}" class="form-control bg-light border-0" id="image" placeholder="https://example.com/product.jpg">
                                    </div>
                                    <div class="form-text ps-1">Proporciona un link directo a la imagen del producto.</div>
                                </div>
                            </div>

                            <div class="d-flex gap-3 mt-5 pt-3 border-top">
                                <button type="submit" class="btn btn-primary btn-lg flex-fill py-3 fs-5">
                                    <i class="bi bi-check2-circle me-2"></i> Confirmar y Guardar
                                </button>
                                <a th:href="@{/products}" class="btn btn-light btn-lg border px-5 py-3 text-muted">Regresar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
